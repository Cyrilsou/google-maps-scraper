{{range .}}
<tr data-job-id="{{.ID}}" data-status="{{.Status}}">
    <td><input type="checkbox" class="job-select" data-job-id="{{.ID}}" aria-label="Select job"/></td>
    <td class="mono">{{.ID}}</td>
    <td>{{.Name}}</td>
    <td>{{.Date}}</td>
    <td>
        <span class="status-indicator status-{{.Status}}">{{.Status}}</span>
    </td>
    <td class="num">{{ if gt .ResultCount 0 }}{{ .ResultCount }}{{ else }}—{{ end }}</td>
    <td class="actions-cell">
        {{ if eq .Status "ok" }}
            <button type="button" class="button preview-button"
                    onclick="window.__gmapsPreview && window.__gmapsPreview('{{.ID}}', '{{.Name}}')">
                Preview
            </button>
            <div class="dropdown">
                <button type="button" class="button download-button dropdown-toggle">Download ▾</button>
                <div class="dropdown-menu">
                    <a href="/download?id={{.ID}}" download>Default</a>
                    <a href="/download?id={{.ID}}&format=csv" download>CSV</a>
                    <a href="/download?id={{.ID}}&format=xlsx" download>Excel (.xlsx)</a>
                    <a href="/download?id={{.ID}}&format=jsonl" download>JSON Lines</a>
                    <a href="/download?id={{.ID}}&format=geojson" download>GeoJSON</a>
                </div>
            </div>
        {{ end }}
        <button type="button" class="button ghost"
                onclick="window.__gmapsDuplicate && window.__gmapsDuplicate('{{.ID}}')"
                title="Reuse this job's settings">Duplicate</button>
        <button hx-delete="/delete?id={{.ID}}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Are you sure you want to delete this job?"
                class="delete-button">Delete</button>
    </td>
</tr>
{{end}}
